version: "3.9"

services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${DOCKER_UID}
        GID: ${DOCKER_GID}
    container_name: be_talent_laravel_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - mysql
      - redis
      - gateways
    networks:
      - betalent

  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    ports:
      - "8003:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - betalent

  mysql:
    image: mysql:8.0
    container_name: laravel_mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: betalent
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - betalent

  redis:
    image: redis:alpine
    container_name: laravel_redis
    ports:
      - "6379:6379"
    networks:
      - betalent

  gateways:
    image: matheusprotzen/gateways-mock
    container_name: betalent_gateways_mock
    ports:
      - "3001:3001"
      - "3002:3002"
    networks:
      - betalent

networks:
  betalent:
    driver: bridge

volumes:
  mysql_data:
    name: laravel_mysql_data